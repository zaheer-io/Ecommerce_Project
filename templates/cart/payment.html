{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

    {% if payment %}
        <form action="{% url 'cart:payment-success' %}" method="POST">
            <script
            src="https://checkout.razorpay.com/v1/checkout.js"
                data-key="rzp_test_Rn84o8Z3bbux28" 
                data-amount="{{ payment.amount }}" 
                data-currency="INR"
                data-order_id="{{ payment.id }}"
                data-buttontext="Pay Now"
                data-name="Fresh Shop"
                data-description="A Wild Sheep Chase is the third novel by Japanese author Haruki Murakami"
                data-image="https://example.com/your_logo.jpg"
                data-prefill.name="{{user.username}}"
                data-prefill.email="{{user.email}}"
                data-theme.color="#63e17cff"
            ></script>
            <input type="hidden" custom="Hidden Element" name="hidden"/>
        </form>
    {% else %}
        <h1>Payment successfully through Cash on Deliver</h1>
    {% endif %}
    
{% endblock %}
