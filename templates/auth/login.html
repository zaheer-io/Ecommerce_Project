{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<div class="container w-50 border-2 shadow mt-5 mb-5 p-3">
    <h1 class="text-center my-3">Login page</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{form|crispy}}
        <input type="submit" class="btn btn-primary rounded-pill w-100 text-center my-3">
    </form>
    
</div>

{% endblock %}
